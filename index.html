<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habassa Royal Temple - Select Language</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bright: #ffd700;
            --gold-dark: #b8860b;
            --gold-soft: #d4a017;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- Welcome Intro Effect --- */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }

        .welcome-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 4rem);
            color: var(--gold-bright);
            letter-spacing: 15px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: welcomeAnim 2.5s ease-in-out forwards;
        }

        @keyframes welcomeAnim {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            40% { opacity: 1; transform: translateY(0); filter: blur(0); }
            80% { opacity: 1; transform: translateY(0); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-20px); filter: blur(10px); }
        }

        .main-content {
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-visible { opacity: 1; }

        /* --- Background Image & Overlay --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://i.ytimg.com/vi/hz_8W0EiCtw/maxresdefault.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .bg-dark-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.6), rgba(0,0,0,0.9));
            z-index: -1;
        }

        /* --- Top Status Bar --- */
        .top-status-bar {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--gold-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            font-size: 0.75rem;
            color: var(--gold-bright);
            z-index: 1001;
            backdrop-filter: blur(15px);
        }

        .auth-btn {
            background: transparent;
            border: 1px solid var(--gold-soft);
            color: var(--gold-bright);
            padding: 5px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.7rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .auth-btn:hover { background: var(--gold-soft); color: #000; }

        .container {
            text-align: center;
            width: 90%;
            max-width: 1000px;
            padding: 100px 10px 40px 10px;
        }

        .title-area h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 12vw, 5.5rem);
            background: linear-gradient(to bottom, #fff7ad 0%, #d4a017 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212, 160, 23, 0.4));
            letter-spacing: clamp(5px, 2vw, 15px);
            margin-bottom: 10px;
            animation: glow 3s infinite alternate;
        }

        .title-area p { color: white; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        /* --- Language Buttons --- */
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            margin-top: 40px;
        }

        .lang-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 160, 23, 0.3);
            border-radius: 15px;
            padding: 30px 20px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .lang-card:hover {
            border-color: var(--gold-bright);
            background: rgba(212, 160, 23, 0.2);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lang-card h3 { font-family: 'Cinzel', serif; color: var(--gold-bright); font-size: 1.5rem; }
        .lang-card span { color: #ddd; font-size: 0.8rem; letter-spacing: 1px; }

        /* Shine Effect */
        .lang-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .lang-card:hover::before { left: 100%; }

        /* --- Gallery Button Section --- */
        .gallery-nav {
            margin-top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .gallery-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 50px;
            background: linear-gradient(45deg, #8a6d3b, #d4a017);
            color: #000;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            letter-spacing: 3px;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(212, 160, 23, 0.3);
            border: 2px solid transparent;
        }

        .gallery-btn:hover {
            transform: scale(1.05);
            background: transparent;
            color: var(--gold-bright);
            border-color: var(--gold-bright);
            box-shadow: 0 0 30px rgba(212, 160, 23, 0.6);
        }

        @media (max-width: 600px) {
            .lang-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .full-w { grid-column: span 2; }
            .gallery-btn { width: 100%; font-size: 1rem; padding: 12px; }
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(212, 160, 23, 0.3)); }
            to { filter: drop-shadow(0 0 25px rgba(212, 160, 23, 0.7)); }
        }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="welcome-text">Welcome</div>
    </div>

    <div class="bg-overlay"></div>
    <div class="bg-dark-layer"></div>

    <div class="main-content" id="home-page">
        <div class="top-status-bar">
            <div id="date-time-box">
                <div id="live-date">Loading...</div>
                <div id="live-time">SL TIME: 00:00:00</div>
            </div>

            <div class="auth-section">
                <div id="auth-guest">
                    <a href="login.html" class="auth-btn">Login</a>
                    <a href="signup.html" class="auth-btn">Sign Up</a>
                </div>
                <div id="user-profile" style="display:none; color: var(--gold-bright);">
                    <span id="user-name">User</span>
                    <span style="color:#ff4d4d; cursor:pointer; margin-left:10px; text-decoration:underline" onclick="logout()">Logout</span>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="title-area">
                <h1 id="main-title">HABASSA</h1>
                <p id="main-subtitle">The Ancient Monastery of Okkampitiya</p>
            </div>

            <div class="lang-grid">
                <a href="si.html" class="lang-card full-w" onclick="setLang('si')">
                    <h3>සිංහල</h3>
                    <span>Sinhala</span>
                </a>
                <a href="en.html" class="lang-card" onclick="setLang('en')">
                    <h3>English</h3>
                    <span>United Kingdom</span>
                </a>
                <a href="tm.html" class="lang-card" onclick="setLang('tm')">
                    <h3>தமிழ்</h3>
                    <span>Tamil</span>
                </a>
                <a href="kr.html" class="lang-card" onclick="setLang('kr')">
                    <h3>한국어</h3>
                    <span>Korean</span>
                </a>
                <a href="jp.html" class="lang-card" onclick="setLang('jp')">
                    <h3>日本語</h3>
                    <span>Japanese</span>
                </a>
            </div>

            <div class="gallery-nav">
                <a href="gallery.html" class="gallery-btn" id="gallery-btn-text">
                    EXPLORE GALLERY
                </a>
            </div>
        </div>
    </div>

    <script>
        // භාෂාව මතක තබා ගන්නා Function එක
        function setLang(lang) {
            localStorage.setItem('selectedLang', lang);
        }

        // භාෂාව අනුව Home Page එකේ Button text එක වෙනස් කිරීම (Optional)
        function updateHomeUI() {
            const lang = localStorage.getItem('selectedLang') || 'en';
            const btn = document.getElementById('gallery-btn-text');
            const translations = {
                si: "ගැලරිය බලන්න",
                en: "EXPLORE GALLERY",
                tm: "புகைப்படங்கள்",
                kr: "갤러리 탐색",
                jp: "ギャラリーを見る"
            };
            btn.innerText = translations[lang] || translations['en'];
        }

        // Clock & Auth Logic
        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', dateOptions);
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0') + ":" + 
                         now.getSeconds().toString().padStart(2, '0');
            document.getElementById('live-time').innerText = "SL TIME: " + time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        window.addEventListener('load', () => {
            updateHomeUI(); // Button text එක Update කරන්න
            const loggedInUser = localStorage.getItem('currentUser');
            if (loggedInUser) {
                document.getElementById('auth-guest').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-name').innerText = "Hi, " + loggedInUser;
            }

            setTimeout(() => {
                document.getElementById('welcome-overlay').style.opacity = '0';
                document.getElementById('welcome-overlay').style.visibility = 'hidden';
                document.getElementById('home-page').classList.add('content-visible');
                document.body.style.overflow = 'auto';
            }, 3000);
        });

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }
    </script>
</body>
</html>
