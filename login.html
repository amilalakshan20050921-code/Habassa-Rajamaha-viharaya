<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Habassa Royal Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4a017;
            --gold-bright: #ffd700;
            --bg-dark: #050505;
            --input-bg: rgba(255, 255, 255, 0.05);
            --gold-dark: #8a6d3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(184, 134, 11, 0.1) 0%, #050505 100%);
            z-index: -1;
        }

        .auth-card {
            background: rgba(15, 15, 15, 0.95);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 160, 23, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold-bright);
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid rgba(212, 160, 23, 0.2);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold-bright);
            box-shadow: 0 0 10px rgba(212, 160, 23, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-bright));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(212, 160, 23, 0.4);
        }

        .divider {
            margin: 30px 0;
            position: relative;
            height: 1px;
            background: rgba(212, 160, 23, 0.2);
        }

        .divider span {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 1);
            padding: 0 15px;
            font-size: 0.8rem;
            color: #777;
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: rgba(212, 160, 23, 0.1);
            border-color: var(--gold);
        }

        .social-btn.google:hover { color: #DB4437; }
        .social-btn.apple:hover { color: #fff; }
        .social-btn.microsoft:hover { color: #00a1f1; }

        .footer-text {
            font-size: 0.9rem;
            color: #aaa;
        }

        .footer-text a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="auth-card">
        <h2>LOGIN</h2>
        
        <div class="social-grid">
            <button id="googleBtn" class="social-btn google" title="Login with Google"><i class="fab fa-google"></i></button>
            <button id="appleBtn" class="social-btn apple" title="Login with Apple"><i class="fab fa-apple"></i></button>
            <button id="msBtn" class="social-btn microsoft" title="Login with Outlook"><i class="fab fa-microsoft"></i></button>
        </div>

        <div class="divider"><span>OR EMAIL</span></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="emailField" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passField" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary">LOGIN NOW</button>
        </form>

        <p class="footer-text" style="margin-top: 25px;">
            Don't have an account? <a href="signup.html">Create Account</a>
        </p>
        <p style="margin-top: 15px;"><a href="index.html" style="color: #666; font-size: 0.8rem; text-decoration: none;">← Back to Home</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAjaZhpLbgkfmLYR17W4J6zv9f6D_Z9K1w",
            authDomain: "project-90-3bc1e.firebaseapp.com",
            projectId: "project-90-3bc1e",
            storageBucket: "project-90-3bc1e.firebasestorage.app",
            messagingSenderId: "367609962151",
            appId: "1:367609962151:web:4b6b5d9b238ea7cbf3c582"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // සාර්ථක ලොගින් එකකින් පසු දත්ත ගබඩා කර index.html වෙත යැවීමේ Function එක
        const handleSuccess = (user) => {
            const name = user.displayName || user.email.split('@')[0];
            localStorage.setItem('currentUser', name);
            window.location.href = 'index.html';
        };

        // 1. Google Login
        document.getElementById('googleBtn').onclick = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((res) => handleSuccess(res.user))
                .catch(e => alert("Google Login Error: " + e.message));
        };

        // 2. Microsoft Login
        document.getElementById('msBtn').onclick = () => {
            const provider = new OAuthProvider('microsoft.com');
            signInWithPopup(auth, provider)
                .then((res) => handleSuccess(res.user))
                .catch(e => alert("Microsoft Login Error: " + e.message));
        };

        // 3. Apple Login
        document.getElementById('appleBtn').onclick = () => {
            const provider = new OAuthProvider('apple.com');
            signInWithPopup(auth, provider)
                .then((res) => handleSuccess(res.user))
                .catch(e => alert("Apple Login requires setup in Firebase Console & Apple Developer Program."));
        };

        // 4. සැබෑ Email/Password Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailField').value;
            const password = document.getElementById('passField').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                handleSuccess(userCredential.user);
            } catch (error) {
                console.error(error);
                alert("Login Error: ඇතුළත් කළ ඊමේල් ලිපිනය හෝ රහස් පදය වැරදියි.");
            }
        };
    </script>
</body>
</html>
