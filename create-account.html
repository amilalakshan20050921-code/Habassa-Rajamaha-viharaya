<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Habassa Royal Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4a017;
            --gold-bright: #ffd700;
            --gold-dark: #8a6d3b;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(212, 160, 23, 0.08) 0%, transparent 70%);
            z-index: -1;
        }

        .create-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            border-radius: 25px;
            border: 1px solid rgba(212, 160, 23, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .create-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold-bright);
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 35px;
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 160, 23, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.4s;
            text-decoration: none;
            outline: none;
        }

        .social-circle:hover {
            background: var(--gold);
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(212, 160, 23, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #444;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(212, 160, 23, 0.1);
        }

        .divider span { padding: 0 15px; }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: var(--gold);
            margin-left: 5px;
            display: block;
            margin-bottom: 7px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 13px 15px 13px 45px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 160, 23, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--gold-bright);
            background: rgba(212, 160, 23, 0.05);
        }

        .terms {
            font-size: 0.75rem;
            color: #777;
            margin: 20px 0;
            line-height: 1.5;
        }

        .terms a { color: var(--gold); text-decoration: none; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-bright));
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(212, 160, 23, 0.4);
        }

        .login-link {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #aaa;
        }

        .login-link a {
            color: var(--gold-bright);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="create-card">
        <h2>CREATE ACCOUNT</h2>
        <p class="subtitle">Join the journey into the ancient history of Habassa</p>

        <div class="social-container">
            <button id="googleBtn" class="social-circle" title="Join with Google"><i class="fab fa-google"></i></button>
            <button id="appleBtn" class="social-circle" title="Join with Apple"><i class="fab fa-apple"></i></button>
            <button id="msBtn" class="social-circle" title="Join with Outlook"><i class="fab fa-microsoft"></i></button>
        </div>

        <div class="divider"><span>Or use your email</span></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPass" placeholder="At least 8 characters" required>
                </div>
            </div>

            <p class="terms">
                By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
            </p>

            <button type="submit" class="submit-btn">Register Now</button>
        </form>

        <div class="login-link">
            Already a member? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            updateProfile, 
            signInWithPopup, 
            GoogleAuthProvider, 
            OAuthProvider 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAjaZhpLbgkfmLYR17W4J6zv9f6D_Z9K1w",
            authDomain: "project-90-3bc1e.firebaseapp.com",
            projectId: "project-90-3bc1e",
            storageBucket: "project-90-3bc1e.firebasestorage.app",
            messagingSenderId: "367609962151",
            appId: "1:367609962151:web:4b6b5d9b238ea7cbf3c582"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // සාර්ථක ලියාපදිංචියකින් පසු ක්‍රියාත්මක වන Function එක
        const handleAuthSuccess = (user, customName = null) => {
            const displayName = customName || user.displayName || user.email.split('@')[0];
            localStorage.setItem('currentUser', displayName);
            alert('Welcome, ' + displayName + '! Your account has been created.');
            window.location.href = 'index.html';
        };

        // 1. Email/Password Registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                // Profile එකේ නම Update කිරීම
                await updateProfile(userCredential.user, { displayName: name });
                handleAuthSuccess(userCredential.user, name);
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        });

        // 2. Google Sign Up
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                handleAuthSuccess(result.user);
            } catch (error) {
                alert("Google Signup Error: " + error.message);
            }
        };

        // 3. Microsoft Sign Up
        document.getElementById('msBtn').onclick = async () => {
            const provider = new OAuthProvider('microsoft.com');
            try {
                const result = await signInWithPopup(auth, provider);
                handleAuthSuccess(result.user);
            } catch (error) {
                alert("Microsoft Signup Error: " + error.message);
            }
        };

        // 4. Apple Sign Up
        document.getElementById('appleBtn').onclick = async () => {
            const provider = new OAuthProvider('apple.com');
            try {
                const result = await signInWithPopup(auth, provider);
                handleAuthSuccess(result.user);
            } catch (error) {
                alert("Apple Signup requires Apple Developer Account setup in Firebase Console.");
            }
        };
    </script>

</body>
</html>
